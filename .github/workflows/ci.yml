name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:ci

      - name: Lint (no autofix)
        run: pnpm --dir apps/DocFlow exec eslint "src/**/*.{ts,tsx}" --max-warnings=0

      - name: Type check
        run: pnpm type-check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  database:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local database and apply migrations
        run: supabase db start

      - name: Run pgTAP suite (RLS, tenancy isolation, role gates)
        run: supabase test db

      - name: Generated types drift check
        # Format with the repo's pinned prettier version + config so the diff
        # compares content, not formatter-version quirks.
        run: |
          supabase gen types typescript --db-url "postgresql://postgres:postgres@127.0.0.1:54322/postgres" > /tmp/database.gen.ts
          npx -y prettier@3.8.1 --config .prettierrc --write /tmp/database.gen.ts
          diff -u apps/DocFlow/src/types/database.ts /tmp/database.gen.ts
